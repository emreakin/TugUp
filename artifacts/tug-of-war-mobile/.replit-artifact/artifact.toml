kind = "mobile"
previewPath = "/mobile/"
title = "Halat Çekme - Mobil"
version = "1.0.0"
id = "artifacts/tug-of-war-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22756

[services.development]
run = "pnpm --filter @workspace/tug-of-war-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/tug-of-war-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/tug-of-war-mobile", "run", "serve" ]

[services.env]
PORT = "22756"
BASE_PATH = "/mobile/"
