services:
  - type: web
    name: tugup-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_VERSION
        value: "22.14.0"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
